services:
  gym-api:
    build:
      context: ../../services/api
    container_name: gym-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-rpi}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/gymops.db}
    expose:
      - "8000"
    volumes:
      - gymops_data:/data
      - ${HERMES_HOME_HOST:-/home/raspi/.hermes}:/root/.hermes
    restart: unless-stopped
    networks:
      - backend

  telegram-bot:
    build:
      context: ../../services/bot
    container_name: gym-telegram-bot
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-rpi}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_BASE_URL: ${API_BASE_URL:-http://gym-api:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      - gym-api
    volumes:
      - gymops_data:/data
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: gym-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - gym-api
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:12.0.2
    container_name: gym-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - backend

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:${NPM_IMAGE_TAG:-latest}
    container_name: gym-npm
    environment:
      TZ: ${TZ:-Europe/Madrid}
    ports:
      - "80:80"
      - "443:443"
      - "${NPM_ADMIN_BIND:-127.0.0.1:81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - gym-api
      - grafana
    restart: unless-stopped
    networks:
      - edge
      - backend

volumes:
  gymops_data:
    name: gymops_data
  prometheus_data:
    name: gym_prometheus_data
  grafana_data:
    name: gym_grafana_data
  npm_data:
    name: gym_npm_data
  npm_letsencrypt:
    name: gym_npm_letsencrypt

networks:
  edge:
    name: gym_edge
  backend:
    name: gym_backend
